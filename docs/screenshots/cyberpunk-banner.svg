<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #050508;
      }
      
      .grid {
        stroke: #12121c;
        stroke-width: 1;
      }
      
      .neon-cyan {
        fill: #00f0ff;
        font-family: 'Share Tech Mono', monospace;
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 4px;
        text-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
        animation: glitch 3s infinite;
      }

      .sub-title {
        fill: #ff007f;
        font-family: 'Share Tech Mono', monospace;
        font-size: 14px;
        letter-spacing: 2px;
        animation: pulse 2s infinite alternate;
      }

      .terminal-text {
        fill: #39ff14;
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
      }

      .cursor {
        fill: #39ff14;
        animation: blink 1s infinite step-end;
      }

      .scanline {
        fill: url(#scanline-gradient);
        animation: scan 6s linear infinite;
      }

      @keyframes glitch {
        0%, 100% { transform: skew(0deg); }
        20% { transform: skew(-2deg); filter: hue-rotate(10deg); }
        21% { transform: skew(3deg); filter: hue-rotate(-20deg); }
        22% { transform: skew(0deg); }
        60% { transform: skew(0deg); }
        61% { transform: skew(-3deg); filter: hue-rotate(30deg); }
        62% { transform: skew(2deg); filter: hue-rotate(0deg); }
        63% { transform: skew(0deg); }
      }

      @keyframes pulse {
        0% { opacity: 0.6; text-shadow: 0 0 2px rgba(255, 0, 127, 0.5); }
        100% { opacity: 1; text-shadow: 0 0 12px rgba(255, 0, 127, 0.9); }
      }

      @keyframes blink {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes scan {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(200px); }
      }
    </style>

    <linearGradient id="scanline-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="800" height="200" rx="6" />

  <g>
    <line class="grid" x1="0" y1="20" x2="800" y2="20" />
    <line class="grid" x1="0" y1="40" x2="800" y2="40" />
    <line class="grid" x1="0" y1="60" x2="800" y2="60" />
    <line class="grid" x1="0" y1="80" x2="800" y2="80" />
    <line class="grid" x1="0" y1="100" x2="800" y2="100" />
    <line class="grid" x1="0" y1="120" x2="800" y2="120" />
    <line class="grid" x1="0" y1="140" x2="800" y2="140" />
    <line class="grid" x1="0" y1="160" x2="800" y2="160" />
    <line class="grid" x1="0" y1="180" x2="800" y2="180" />
    <line class="grid" x1="50" y1="0" x2="50" y2="200" />
    <line class="grid" x1="100" y1="0" x2="100" y2="200" />
    <line class="grid" x1="150" y1="0" x2="150" y2="200" />
    <line class="grid" x1="200" y1="0" x2="200" y2="200" />
    <line class="grid" x1="250" y1="0" x2="250" y2="200" />
    <line class="grid" x1="300" y1="0" x2="300" y2="200" />
    <line class="grid" x1="350" y1="0" x2="350" y2="200" />
    <line class="grid" x1="400" y1="0" x2="400" y2="200" />
    <line class="grid" x1="450" y1="0" x2="450" y2="200" />
    <line class="grid" x1="500" y1="0" x2="500" y2="200" />
    <line class="grid" x1="550" y1="0" x2="550" y2="200" />
    <line class="grid" x1="600" y1="0" x2="600" y2="200" />
    <line class="grid" x1="650" y1="0" x2="650" y2="200" />
    <line class="grid" x1="700" y1="0" x2="700" y2="200" />
    <line class="grid" x1="750" y1="0" x2="750" y2="200" />
  </g>

  <text x="400" y="80" text-anchor="middle" class="neon-cyan">AGENT_SKILLS_SYSTEM</text>
  <text x="400" y="115" text-anchor="middle" class="sub-title">CORE PIPELINES &amp; ROUTING MODELS ACTIVE</text>
  <text x="20" y="180" class="terminal-text">&gt; SECURE_LINK: CONNECTED // SYSTEM_MODULES: 24 ACTIVE // ONLINE_DOCS: 100%</text>
  <rect x="520" y="170" width="8" height="12" class="cursor" />
  <rect class="scanline" width="800" height="200" pointer-events="none" />
</svg>
