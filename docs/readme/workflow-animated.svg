<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="t d"><title id="t">Animated agent workflow</title><desc id="d">A workflow moving from reconnaissance through design, implementation, quality assurance, and deployment.</desc><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#070810"/><stop offset="1" stop-color="#160912"/></linearGradient><linearGradient id="flow"><stop stop-color="#00f0ff"/><stop offset=".55" stop-color="#ff2f88"/><stop offset="1" stop-color="#39ff14"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.rail{stroke-dasharray:14 18;animation:rail 2.4s linear infinite}.packet{animation:packet 5s linear infinite}.node{animation:pulse 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.n2{animation-delay:1s}.n3{animation-delay:2s}.n4{animation-delay:3s}.n5{animation-delay:4s}@keyframes rail{to{stroke-dashoffset:-64}}@keyframes packet{0%{transform:translateX(0);opacity:0}8%,92%{opacity:1}100%{transform:translateX(900px);opacity:0}}@keyframes pulse{0%,16%,100%{opacity:.55;transform:scale(.96)}8%{opacity:1;transform:scale(1.04)}}@media(prefers-reduced-motion:reduce){.rail,.packet,.node{animation:none!important}}</style></defs><rect width="1200" height="300" rx="22" fill="url(#bg)"/><rect x="1" y="1" width="1198" height="298" rx="21" fill="none" stroke="#293149"/><text x="46" y="48" fill="#f4f6ff" font-size="25" font-weight="700">A WORKFLOW, NOT A SINGLE PROMPT</text><text x="46" y="77" fill="#7f879d" font-size="14">Each specialist owns one failure class and hands off with evidence.</text><path d="M150 165H1050" stroke="#222940" stroke-width="9" stroke-linecap="round"/><path class="rail" d="M150 165H1050" stroke="url(#flow)" stroke-width="3"/><g class="packet" transform="translate(150 165)"><circle r="7" fill="#fff" filter="url(#g)"/></g><g class="node"><rect x="65" y="120" width="170" height="90" rx="14" fill="#09151c" stroke="#00f0ff"/><text x="150" y="152" text-anchor="middle" fill="#00f0ff" font-size="12">01 / INSPECT</text><text x="150" y="181" text-anchor="middle" fill="#e1edf2" font-size="14">codebase-recon</text></g><g class="node n2"><rect x="290" y="120" width="170" height="90" rx="14" fill="#11121d" stroke="#8898ff"/><text x="375" y="152" text-anchor="middle" fill="#a9b2ff" font-size="12">02 / STRATEGY</text><text x="375" y="181" text-anchor="middle" fill="#e6e8fa" font-size="14">domain specialist</text></g><g class="node n3"><rect x="515" y="120" width="170" height="90" rx="14" fill="#190d17" stroke="#ff2f88"/><text x="600" y="152" text-anchor="middle" fill="#ff6aaa" font-size="12">03 / IMPLEMENT</text><text x="600" y="181" text-anchor="middle" fill="#f8e0ec" font-size="14">build specialist</text></g><g class="node n4"><rect x="740" y="120" width="170" height="90" rx="14" fill="#15120d" stroke="#f2b84b"/><text x="825" y="152" text-anchor="middle" fill="#f3c770" font-size="12">04 / VERIFY</text><text x="825" y="181" text-anchor="middle" fill="#f6ecd8" font-size="14">visual + interaction QA</text></g><g class="node n5"><rect x="965" y="120" width="170" height="90" rx="14" fill="#0c170f" stroke="#39ff14"/><text x="1050" y="152" text-anchor="middle" fill="#7dff68" font-size="12">05 / RELEASE</text><text x="1050" y="181" text-anchor="middle" fill="#dff8da" font-size="14">deployment-verifier</text></g><text x="600" y="260" text-anchor="middle" fill="#788198" font-size="13">NO “DONE” WITHOUT BUILD, INTERACTION, SCREENSHOT, AND PRODUCTION EVIDENCE</text></svg>