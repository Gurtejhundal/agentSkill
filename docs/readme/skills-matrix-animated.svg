<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="t d"><title id="t">Animated skills matrix</title><desc id="d">Six skill categories connect to a central orchestration core.</desc><defs><radialGradient id="bg"><stop stop-color="#121526"/><stop offset="1" stop-color="#050508"/></radialGradient><filter id="g"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.link{stroke-dasharray:8 13;animation:move 2.8s linear infinite}.card{animation:breathe 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.c2{animation-delay:.6s}.c3{animation-delay:1.2s}.c4{animation-delay:1.8s}.c5{animation-delay:2.4s}.c6{animation-delay:3s}.core{animation:core 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}@keyframes move{to{stroke-dashoffset:-42}}@keyframes breathe{0%,100%{opacity:.72;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}@keyframes core{0%,100%{transform:scale(.96);opacity:.75}50%{transform:scale(1.05);opacity:1}}@media(prefers-reduced-motion:reduce){.link,.card,.core{animation:none!important}}</style></defs><rect width="1200" height="360" rx="22" fill="url(#bg)"/><rect x="1" y="1" width="1198" height="358" rx="21" fill="none" stroke="#293149"/><text x="45" y="45" fill="#f2f5ff" font-size="23" font-weight="700">24 SPECIALIST SKILLS / 6 SYSTEM LAYERS</text><text x="45" y="72" fill="#747d92" font-size="13">Choose the smallest specialist set that matches the failure.</text><g stroke="#00f0ff" stroke-opacity=".55" fill="none" class="link"><path d="M275 140L520 180"/><path d="M275 265L520 180"/><path d="M925 140L680 180"/><path d="M925 265L680 180"/><path d="M600 100V145"/><path d="M600 260V215"/></g><g class="core" filter="url(#g)"><circle cx="600" cy="180" r="68" fill="#11121a" stroke="#ff2f88" stroke-width="2"/><circle cx="600" cy="180" r="52" fill="none" stroke="#00f0ff" stroke-dasharray="5 8"/><text x="600" y="174" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">ORCHESTRATOR</text><text x="600" y="197" text-anchor="middle" fill="#ff69aa" font-size="11">INSPECT → ROUTE → VERIFY</text></g><g class="card"><rect x="60" y="98" width="215" height="82" rx="13" fill="#0b151c" stroke="#00f0ff"/><text x="82" y="128" fill="#00f0ff" font-size="12">STRATEGY + DESIGN</text><text x="82" y="153" fill="#dceaf0" font-size="14">4 skills</text></g><g class="card c2"><rect x="60" y="222" width="215" height="82" rx="13" fill="#10101a" stroke="#8c9cff"/><text x="82" y="252" fill="#a6b0ff" font-size="12">RESPONSIVE + TYPE</text><text x="82" y="277" fill="#e5e7f8" font-size="14">4 skills</text></g><g class="card c3"><rect x="492" y="70" width="216" height="66" rx="13" fill="#180d17" stroke="#ff2f88"/><text x="600" y="98" text-anchor="middle" fill="#ff69aa" font-size="12">MOTION + INTERACTION</text><text x="600" y="119" text-anchor="middle" fill="#f7dfeb" font-size="13">4 skills</text></g><g class="card c4"><rect x="925" y="98" width="215" height="82" rx="13" fill="#121314" stroke="#f2b84b"/><text x="947" y="128" fill="#f2c56c" font-size="12">ARCHITECTURE</text><text x="947" y="153" fill="#f5ead4" font-size="14">4 skills</text></g><g class="card c5"><rect x="925" y="222" width="215" height="82" rx="13" fill="#14100b" stroke="#ff914d"/><text x="947" y="252" fill="#ffad72" font-size="12">DOMAIN UX</text><text x="947" y="277" fill="#f5e4d8" font-size="14">4 skills</text></g><g class="card c6"><rect x="492" y="224" width="216" height="66" rx="13" fill="#0d170f" stroke="#39ff14"/><text x="600" y="252" text-anchor="middle" fill="#7dff68" font-size="12">QUALITY + DELIVERY</text><text x="600" y="273" text-anchor="middle" fill="#dff7da" font-size="13">4 skills</text></g></svg>